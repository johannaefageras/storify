<!doctype html>
<html lang="sv">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#f43f7a" />

		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<link rel="icon" href="/favicons/pink/favicon.ico" sizes="48x48" />
		<link rel="icon" href="/favicons/pink/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/favicons/pink/apple-touch-icon.png" />
		<link rel="manifest" href="/favicons/pink/site.webmanifest" />
		<script>
			{
				try {
					const storedAccent = localStorage.getItem('accent');
					const accent =
						storedAccent === 'lime'
							? 'emerald'
							: storedAccent === 'red'
								? 'purple'
								: ['pink', 'amber', 'blue', 'emerald', 'purple', 'rust'].includes(storedAccent)
									? storedAccent
									: 'pink';
					const icon = document.querySelector('link[rel="icon"][sizes="48x48"]');
					const svgIcon = document.querySelector('link[rel="icon"][type="image/svg+xml"]');
					const appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
					const manifest = document.querySelector('link[rel="manifest"]');
					const themeColor = document.querySelector('meta[name="theme-color"]');
					const accentColors = {
						pink: '#f43f7a',
						amber: '#F0A83A',
						blue: '#2B8DB8',
						emerald: '#2e7d32',
						purple: '#6a1b9a',
						rust: '#b53d2a'
					};
					icon.href = `/favicons/${accent}/favicon.ico`;
					svgIcon.href = `/favicons/${accent}/favicon.svg`;
					appleIcon.href = `/favicons/${accent}/apple-touch-icon.png`;
					manifest.href = `/favicons/${accent}/site.webmanifest`;
					themeColor.content = accentColors[accent];
				} catch {
					// Keep the default pink favicon set.
				}
			}
		</script>
		<script>
			(function () {
				var p = location.protocol;
				var h = location.hostname;
				// Block Capacitor / file webviews
				if (p === 'capacitor:' || p === 'file:') return;
				// Allowlist production hostnames only — never send from dev/preview/Render
				if (h !== 'mystorify.se' && h !== 'www.mystorify.se') return;

				window.dataLayer = window.dataLayer || [];
				window.gtag = function () { window.dataLayer.push(arguments); };

				// Consent Mode v2 — default DENIED, must run before gtag.js loads
				gtag('consent', 'default', {
					ad_storage: 'denied',
					ad_user_data: 'denied',
					ad_personalization: 'denied',
					analytics_storage: 'denied',
					wait_for_update: 500
				});

				// Restore prior consent BEFORE gtag.js loads so the first
				// page_view of returning consenters is granted-state, not denied.
				try {
					var stored = localStorage.getItem('ga_consent_v2');
					if (stored === 'granted' || stored === 'denied') {
						gtag('consent', 'update', {
							analytics_storage: stored,
							ad_storage: 'denied',
							ad_user_data: 'denied',
							ad_personalization: 'denied'
						});
					}
				} catch (e) { /* private mode */ }

				gtag('js', new Date());
				gtag('config', 'G-QYQJ9TNYQC', {
					send_page_view: false,
					anonymize_ip: true,
					transport_type: 'beacon'
				});

				var s = document.createElement('script');
				s.async = true;
				s.src = 'https://www.googletagmanager.com/gtag/js?id=G-QYQJ9TNYQC';
				document.head.appendChild(s);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
