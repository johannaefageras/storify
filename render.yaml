services:
  - type: web
    name: storify
    runtime: node
    plan: pro
    region: frankfurt # Closest to Sweden
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ANTHROPIC_API_KEY
        sync: false # Set manually in Render dashboard
      - key: RESEND_API_KEY
        sync: false # Set manually in Render dashboard
      - key: UPSTASH_REDIS_REST_URL
        sync: false # Required for server-side rate limiting
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false # Required for server-side rate limiting
      - key: PUBLIC_SUPABASE_URL
        sync: false # Set manually in Render dashboard
      - key: PUBLIC_SUPABASE_ANON_KEY
        sync: false # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # Set manually in Render dashboard
      - key: CHAT_MODEL
        value: claude-sonnet-4-6
      - key: CHAT_MAX_TOKENS
        value: "512"
      - key: GENERATE_PRIMARY_MODEL
        value: claude-opus-4-6
      - key: GENERATE_FALLBACK_MODEL
        value: claude-sonnet-4-6
      - key: GENERATE_MAX_TOKENS
        value: "2048"

  # Weekly personalized newsletter. Runs hourly UTC; the script filters to
  # users whose local time is currently Sunday 09:00. Safe to run with zero
  # opted-in users (it just logs "candidates=0"). Before the first real send,
  # verify the bystorify.se domain in Resend (SPF/DKIM/DMARC) — see
  # STORIFY-NEWSLETTER-PLAN.md §7.
  - type: cron
    name: storify-newsletter-weekly
    runtime: node
    region: frankfurt
    schedule: "0 * * * *"
    buildCommand: npm install && npm run build:cron
    startCommand: node dist/cron/send-weekly.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: RESEND_API_KEY
        sync: false
      - key: PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://mystorify.se

  # Daily journal push reminders. Runs hourly UTC; script filters to users
  # whose local time is currently 20:00 and who haven't written today.
  # Safe with zero opted-in users (logs "due=0" and exits).
  - type: cron
    name: storify-push-reminders
    runtime: node
    region: frankfurt
    schedule: "0 * * * *"
    buildCommand: npm install && npm run build:cron
    startCommand: node dist/cron/send-reminders.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_VAPID_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:hi@mystorify.se
